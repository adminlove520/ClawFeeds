
name: OPENCLAWMEME Monitor

on:
  schedule:
    # 每 15 分钟运行一次
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RSS Monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python Rss_monitor.py --once

      - name: Update database
        if: always()
        run: |
          git config --global user.name 'RSS Monitor Bot'
          git config --global user.email 'bot@noreply.github.com'
          git add articles.db 2>/dev/null || true
          git commit -m "Update database $(date +%Y-%m-%d\ %H:%M)" --allow-empty 2>/dev/null || true
          git push --force-with-lease
