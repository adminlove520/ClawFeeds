# ClawFeeds 完整配置示例
# 复制为 config.yaml 使用

# ======== 必填 ========
github:
  token: "ghp_xxxxxxxxxxxxxxxxxxxx"
  owner: "adminlove520"
  repo: "ClawFeeds"

# ======== 推送配置 ========
push:
  # GitHub Discussion
  github_discussion:
    switch: "ON"
    discussion_owner: "ythx-101"
    discussion_repo: "openclaw-qa"
    discussion_number: 133
    mode: "each"

  # 钉钉
  dingding:
    webhook: "https://oapi.dingtalk.com/robot/send?access_token=xxx"
    secret_key: "SECxxx"
    switch: "OFF"

  # Discord
  discard:
    webhook: "https://discord.com/api/webhooks/xxx"
    switch: "OFF"

  # 飞书
  feishu:
    webhook: "https://open.feishu.cn/open-apis/bot/hook/xxx"
    switch: "OFF"

  # Telegram
  tg_bot:
    token: "xxx"
    group_id: "xxx"
    switch: "OFF"

# ======== AI 评论（可选） ========
# 使用 MiniMax API 生成评论
ai_comment:
  switch: "OFF"
  api_key: "your_minimax_api_key"

# ======== 代理（可选） ========
proxy:
  enable: "OFF"
  http_proxy: "http://127.0.0.1:7890"
  https_proxy: "http://127.0.0.1:7890"
  no_proxy: "localhost,127.0.0.1"

# ======== 夜间休眠（可选） ========
night_sleep:
  switch: "ON"
